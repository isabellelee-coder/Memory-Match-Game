<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Guided | Memory Match</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="game-pages.css">
</head>

<body>

    <main class="mm-page" data-game-level="guided">

        <header class="mm-page-header">

            <a class="mm-back-link" href="play.html">
                ← Back
            </a>

            <h1>Guided</h1>

        </header>

        <p class="mm-game-instruction">
            Select one item from each row to create a match.
            Continue until every card has been matched.
        </p>

        <div
            class="mm-empty-message"
            data-empty-message
            hidden
        >
            This level has not been set up yet. Go to
            <a href="edit-guided.html">
                <strong>Edit Guided</strong>
            </a>
            to add matching pairs first.
        </div>

        <section data-game-area>

            <p
                class="mm-progress"
                data-progress
            ></p>

            <div class="mm-board-scroll">

                <div
                    class="mm-game-board"
                    data-game-board
                >

                    <p class="mm-board-label">
                        First items
                    </p>

                    <div
                        class="mm-play-row"
                        data-play-first-row
                    ></div>

                    <p
                        class="mm-board-label"
                        style="margin-top: 78px;"
                    >
                        Matching items
                    </p>

                    <div
                        class="mm-play-row"
                        data-play-match-row
                    ></div>

                    <svg
                        class="mm-line-layer"
                        aria-hidden="true"
                    ></svg>

                </div>

            </div>

            <section
                class="mm-results"
                data-results
                hidden
                aria-live="polite"
            >

                <h2>Results</h2>

                <p
                    class="mm-score"
                    data-score
                ></p>

                <ul
                    class="mm-result-list"
                    data-result-list
                ></ul>

                <div class="mm-result-actions">

                    <button
                        class="mm-button mm-button-primary"
                        type="button"
                        data-try-again
                    >
                        Try Again
                    </button>

                    <a
                        class="mm-button"
                        href="play.html"
                    >
                        Back to Levels
                    </a>

                </div>

            </section>

        </section>

    </main>

    <script src="memory-game.js"></script>

</body>
</html>
