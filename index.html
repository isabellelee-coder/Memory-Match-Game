<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Memory Match</title>

    <link rel="stylesheet" href="style.css">

    <style>
        /* Homepage only */
        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(
                    circle at top,
                    #ffffff 0%,
                    #f7f8fb 48%,
                    #eef1f6 100%
                );
            color: #1d1d1f;
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "SF Pro Display",
                "SF Pro Text",
                "Helvetica Neue",
                Arial,
                sans-serif;
        }

        .cover-page {
            box-sizing: border-box;
            width: 100%;
            min-height: 100vh;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;

            padding:
                clamp(28px, 5vh, 54px)
                24px
                48px;

            text-align: center;
        }

        .cover-logo {
            display: block;

            width: auto;
            height: auto;

            max-width: min(180px, 38vw);
            max-height: 12.5vh;

            margin: 0 auto clamp(24px, 4vh, 40px);

            object-fit: contain;
        }

        .hero-content {
            width: min(100%, 720px);

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cover-page h1 {
            margin: 0;

            font-size: clamp(42px, 7vw, 76px);
            font-weight: 700;
            line-height: 1.02;
            letter-spacing: -0.055em;

            color: #1d1d1f;
        }

        .subtitle {
            max-width: 610px;

            margin:
                clamp(18px, 3vh, 26px)
                auto
                clamp(34px, 5vh, 52px);

            font-size: clamp(18px, 2.4vw, 24px);
            font-weight: 400;
            line-height: 1.5;
            letter-spacing: -0.015em;

            color: #6e6e73;
        }

        .button-group {
            width: min(100%, 440px);

            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .home-button {
            min-height: 62px;

            border: none;
            border-radius: 18px;

            padding: 16px 24px;

            font: inherit;
            font-size: 19px;
            font-weight: 600;

            cursor: pointer;

            transition:
                transform 160ms ease,
                box-shadow 160ms ease,
                background-color 160ms ease;
        }

        .home-button:hover {
            transform: translateY(-2px);
        }

        .home-button:active {
            transform: translateY(0);
        }

        .setup-button {
            background: #1d1d1f;
            color: #ffffff;

            box-shadow:
                0 12px 28px rgba(0, 0, 0, 0.14);
        }

        .setup-button:hover {
            background: #000000;
        }

        .play-button {
            background: rgba(255, 255, 255, 0.88);
            color: #1d1d1f;

            border: 1px solid rgba(0, 0, 0, 0.08);

            box-shadow:
                0 12px 28px rgba(0, 0, 0, 0.08);

            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .play-button:hover {
            background: #ffffff;
        }

        @media (max-width: 560px) {
            .cover-page {
                padding-top: 28px;
            }

            .cover-logo {
                max-width: 135px;
                max-height: 12.5vh;

                margin-bottom: 26px;
            }

            .button-group {
                grid-template-columns: 1fr;
                width: min(100%, 340px);
            }

            .home-button {
                min-height: 58px;
            }
        }
    </style>
</head>

<body>

    <main class="cover-page">

        <img
            src="cover-logo.png"
            alt="Memory Match logo"
            class="cover-logo"
        >

        <section class="hero-content">

            <h1>Memory Match</h1>

            <p class="subtitle">
                A personalized memory game designed to help people
                reconnect with faces, memories, and stories that matter most.
            </p>

            <div class="button-group">

                <button
                    type="button"
                    class="home-button setup-button"
                    onclick="location.href='setup.html'"
                >
                    Setup
                </button>

                <button
                    type="button"
                    class="home-button play-button"
                    onclick="location.href='play.html'"
                >
                    Play
                </button>

            </div>

        </section>

    </main>

</body>
</html>
